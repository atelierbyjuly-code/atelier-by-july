<body>

<div class="container">

<h1>Atelier By July</h1>
<h2>Calculadora 3D</h2>

<label>Peso (g)</label>
<input type="number" id="peso">

<label>Tempo (h)</label>
<input type="number" id="tempo">

<label>Material</label>
<select id="material">
    <option value="0.03">PLA (€0.03/g)</option>
    <option value="0.05">ABS (€0.05/g)</option>
    <option value="0.08">PETG (€0.08/g)</option>
</select>

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado">Resultado aparecerá aqui</div>

<div class="pedidos">
    <h3>Histórico</h3>
    <div id="listaPedidos"></div>
</div>

</div>

<script>
function calcular() {

    let peso = parseFloat(document.getElementById("peso").value);
    let tempo = parseFloat(document.getElementById("tempo").value);
    let material = parseFloat(document.getElementById("material").value);

    if (!peso || !tempo) {
        document.getElementById("resultado").innerText = "Preencha todos os campos.";
        return;
    }

    let custoMaterial = peso * material;
    let custoTempo = tempo * 1.5;
    let total = custoMaterial + custoTempo;

    let resultadoTexto = `
Material: €${custoMaterial.toFixed(2)}
Tempo: €${custoTempo.toFixed(2)}
Total: €${total.toFixed(2)}
    `;

    document.getElementById("resultado").innerText = resultadoTexto;

    salvarPedido(peso, tempo, total);
}

function salvarPedido(peso, tempo, total) {

    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    pedidos.push({
        peso: peso,
        tempo: tempo,
        total: total.toFixed(2)
    });

    localStorage.setItem("pedidos", JSON.stringify(pedidos));

    carregarPedidos();
}

function carregarPedidos() {

    let lista = document.getElementById("listaPedidos");
    lista.innerHTML = "";

    let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

    pedidos.reverse().forEach(p => {
        let div = document.createElement("div");
        div.className = "pedido";
        div.innerText = `Peso: ${p.peso}g | Tempo: ${p.tempo}h | Total: €${p.total}`;
        lista.appendChild(div);
    });
}

carregarPedidos();
</script>

</body>
</html>
